version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: Movie_Management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  booking-app:
    build: .
    container_name: booking_simulation
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
    stdin_open: true
    tty: true

volumes:
  pgdata: